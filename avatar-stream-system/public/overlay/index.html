<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Stream Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
    }
    canvas {
      display: block;
      width: 100%; height: 100%;
      background: transparent;
    }
  </style>
</head>
<body>
<canvas id="overlay"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
// ============================================================================
// Avatar Stream Overlay - Canvas Renderer
// ============================================================================
(function() {
  'use strict';

  // ---------------------------------------------------------------------------
  // Canvas Setup
  // ---------------------------------------------------------------------------
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d', { alpha: true });

  let W = 1920, H = 1080;
  const DPR = 1; // Force 1x for OBS performance – no HiDPI overhead

  function resizeCanvas() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ---------------------------------------------------------------------------
  // Config (received from server)
  // ---------------------------------------------------------------------------
  let config = {
    avatar: { defaultSpeed: 2, jumpHeight: 120, jumpDuration: 500, size: 64, spriteColumns: 4, spriteRows: 4, animationSpeed: 150 },
    battleRoyale: { damagePerHit: 10, attackRange: 60, attackCooldown: 800, shrinkSpeed: 0.5, shrinkInterval: 5000 },
    overlay: { width: 1920, height: 1080 }
  };

  // ---------------------------------------------------------------------------
  // Sprite System
  // ---------------------------------------------------------------------------
  const spriteCache = new Map(); // name -> { image, cols, rows, frameWidth, frameHeight }
  const spriteLoadQueue = [];

  function loadSprite(name, src, cols, rows) {
    if (spriteCache.has(name)) return;
    const img = new Image();
    img.onload = () => {
      spriteCache.set(name, {
        image: img,
        cols: cols || config.avatar.spriteColumns,
        rows: rows || config.avatar.spriteRows,
        frameWidth: img.width / (cols || config.avatar.spriteColumns),
        frameHeight: img.height / (rows || config.avatar.spriteRows)
      });
    };
    img.src = src;
  }

  function drawSprite(avatar, x, y, w, h) {
    const spriteName = avatar.spriteName;
    if (!spriteName || !spriteCache.has(spriteName)) return false;

    const sprite = spriteCache.get(spriteName);
    let frameCol = 0;
    let frameRow = 0;

    // Row based on state
    switch (avatar.state) {
      case 'idle':     frameRow = 0; break;
      case 'walking':  frameRow = 1; break;
      case 'jumping':  frameRow = 2; break;
      case 'attacking':frameRow = 3; break;
      case 'dancing':  frameRow = 0; break; // reuse idle row
      case 'dead':     frameRow = 3; frameCol = sprite.cols - 1; break;
      default:         frameRow = 0;
    }

    // Column cycles through frames
    if (avatar.state !== 'dead') {
      frameCol = avatar.animFrame % sprite.cols;
    }

    const sx = frameCol * sprite.frameWidth;
    const sy = frameRow * sprite.frameHeight;

    ctx.drawImage(
      sprite.image,
      sx, sy, sprite.frameWidth, sprite.frameHeight,
      x, y, w, h
    );
    return true;
  }

  // ---------------------------------------------------------------------------
  // Avatar State (local mirror)
  // ---------------------------------------------------------------------------
  const avatars = new Map();
  let battleRoyaleActive = false;
  let battleRoyaleZone = null;

  // ---------------------------------------------------------------------------
  // Effects System
  // ---------------------------------------------------------------------------
  const effects = [];

  function addExplosion(x, y, color, count) {
    const particles = [];
    const num = count || 12;
    for (let i = 0; i < num; i++) {
      const angle = (Math.PI * 2 / num) * i + Math.random() * 0.3;
      const speed = 2 + Math.random() * 4;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        size: 3 + Math.random() * 4,
        color: color
      });
    }
    effects.push({ type: 'explosion', particles, startTime: Date.now() });
  }

  function addJoinEffect(x, y, color) {
    effects.push({ type: 'join', x, y, color, startTime: Date.now(), duration: 600 });
  }

  function addHitEffect(x, y) {
    effects.push({ type: 'hit', x, y, startTime: Date.now(), duration: 200 });
  }

  function addNukeEffect(explosions) {
    effects.push({ type: 'nuke', explosions, startTime: Date.now(), duration: 1500 });
  }

  // ---------------------------------------------------------------------------
  // Physics & AI Update
  // ---------------------------------------------------------------------------
  const GRAVITY = 0.6;
  const GROUND_Y_RATIO = 0.9; // ground at 90% of canvas height

  function getGroundY() {
    if (battleRoyaleZone) {
      return battleRoyaleZone.y + battleRoyaleZone.height * GROUND_Y_RATIO;
    }
    return H * GROUND_Y_RATIO;
  }

  function updateAvatars(dt) {
    const groundY = getGroundY();
    const now = Date.now();

    for (const [id, avatar] of avatars) {
      if (avatar.state === 'dead') continue;

      // --- Animation timer ---
      avatar.animTimer += dt;
      if (avatar.animTimer >= config.avatar.animationSpeed) {
        avatar.animTimer = 0;
        avatar.animFrame = (avatar.animFrame + 1) % config.avatar.spriteColumns;
      }

      // --- Attack cooldown ---
      if (avatar.attackCooldown > 0) {
        avatar.attackCooldown -= dt;
      }

      // --- Jump physics ---
      if (avatar.isJumping) {
        const elapsed = now - avatar.jumpStartTime;
        const duration = config.avatar.jumpDuration;
        if (elapsed >= duration) {
          avatar.isJumping = false;
          avatar.vy = 0;
          avatar.y = groundY - avatar.height;
          avatar.state = avatar.vx !== 0 ? 'walking' : 'idle';
        } else {
          // Parabolic jump
          const progress = elapsed / duration;
          const jumpH = config.avatar.jumpHeight;
          avatar.y = (groundY - avatar.height) - jumpH * Math.sin(progress * Math.PI);
        }
      }

      // --- Horizontal movement ---
      if (battleRoyaleActive && avatar.state !== 'dancing') {
        // Battle Royale AI
        updateBattleAI(avatar, groundY, now);
      } else {
        // Normal idle movement
        if (!avatar.isJumping) {
          // Gentle wandering
          if (Math.random() < 0.005) {
            avatar.vx = (Math.random() - 0.5) * config.avatar.defaultSpeed * 2;
          }
          avatar.state = Math.abs(avatar.vx) > 0.3 ? 'walking' : 'idle';
        }
      }

      avatar.x += avatar.vx;

      // --- Direction ---
      if (avatar.vx > 0.1) avatar.direction = 1;
      else if (avatar.vx < -0.1) avatar.direction = -1;

      // --- Screen edge collision ---
      const minX = battleRoyaleZone ? battleRoyaleZone.x : 0;
      const maxX = battleRoyaleZone
        ? battleRoyaleZone.x + battleRoyaleZone.width - avatar.width
        : W - avatar.width;

      if (avatar.x < minX) {
        avatar.x = minX;
        avatar.vx = Math.abs(avatar.vx) * 0.8;
      }
      if (avatar.x > maxX) {
        avatar.x = maxX;
        avatar.vx = -Math.abs(avatar.vx) * 0.8;
      }

      // Keep on ground if not jumping
      if (!avatar.isJumping && avatar.y > groundY - avatar.height) {
        avatar.y = groundY - avatar.height;
      }

      // --- Battle Royale zone damage ---
      if (battleRoyaleActive && battleRoyaleZone) {
        if (avatar.x < battleRoyaleZone.x ||
            avatar.x + avatar.width > battleRoyaleZone.x + battleRoyaleZone.width) {
          avatar.hp -= 0.05; // slow zone damage
        }
      }

      // --- Death check ---
      if (avatar.hp <= 0) {
        avatar.hp = 0;
        avatar.state = 'dead';
        addExplosion(avatar.x + avatar.width / 2, avatar.y + avatar.height / 2, avatar.color, 20);

        // Check battle royale winner
        if (battleRoyaleActive) {
          const alive = Array.from(avatars.values()).filter(a => a.state !== 'dead');
          if (alive.length <= 1) {
            battleRoyaleActive = false;
            if (alive.length === 1) {
              socket.emit('chatCommand', { username: 'System', command: '!winner ' + alive[0].username });
            }
          }
        }
      }
    }
  }

  function updateBattleAI(avatar, groundY, now) {
    // Find nearest alive target
    if (!avatar.targetId || !avatars.has(avatar.targetId) || avatars.get(avatar.targetId).state === 'dead') {
      let nearest = null;
      let nearestDist = Infinity;
      for (const [id, target] of avatars) {
        if (id === avatar.id || target.state === 'dead') continue;
        const dx = target.x - avatar.x;
        const dist = Math.abs(dx);
        if (dist < nearestDist) {
          nearestDist = dist;
          nearest = id;
        }
      }
      avatar.targetId = nearest;
    }

    if (!avatar.targetId) return;

    const target = avatars.get(avatar.targetId);
    if (!target || target.state === 'dead') { avatar.targetId = null; return; }

    const dx = target.x - avatar.x;
    const dist = Math.abs(dx);

    // Move towards target
    const speed = config.avatar.defaultSpeed * 1.5;
    if (dist > config.battleRoyale.attackRange) {
      avatar.vx = Math.sign(dx) * speed;
      avatar.state = 'walking';
    } else {
      avatar.vx *= 0.5; // slow down near target
      avatar.state = 'idle';

      // Attack!
      if (avatar.attackCooldown <= 0) {
        avatar.state = 'attacking';
        avatar.attackCooldown = config.battleRoyale.attackCooldown;

        // Apply damage
        target.hp -= config.battleRoyale.damagePerHit;
        addHitEffect(target.x + target.width / 2, target.y + target.height / 2);

        setTimeout(() => {
          if (avatar.state === 'attacking') avatar.state = 'idle';
        }, 300);

        // Random jump during battle
        if (!avatar.isJumping && Math.random() < 0.2) {
          avatar.isJumping = true;
          avatar.jumpStartTime = Date.now();
          avatar.state = 'jumping';
        }
      }
    }
  }

  function updateEffects(dt) {
    for (let i = effects.length - 1; i >= 0; i--) {
      const e = effects[i];
      const elapsed = Date.now() - e.startTime;

      if (e.type === 'explosion') {
        let allDead = true;
        for (const p of e.particles) {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.1; // gravity
          p.life -= 0.02;
          if (p.life > 0) allDead = false;
        }
        if (allDead) effects.splice(i, 1);
      } else if (e.type === 'join') {
        if (elapsed > e.duration) effects.splice(i, 1);
      } else if (e.type === 'hit') {
        if (elapsed > e.duration) effects.splice(i, 1);
      } else if (e.type === 'nuke') {
        if (elapsed > e.duration) effects.splice(i, 1);
      }
    }
  }

  // ---------------------------------------------------------------------------
  // Battle Royale Zone Shrink
  // ---------------------------------------------------------------------------
  let lastShrinkTime = 0;

  function updateBattleRoyaleZone(now) {
    if (!battleRoyaleActive || !battleRoyaleZone) return;
    if (now - lastShrinkTime < config.battleRoyale.shrinkInterval) return;
    lastShrinkTime = now;

    const shrink = config.battleRoyale.shrinkSpeed * 50;
    battleRoyaleZone.x += shrink;
    battleRoyaleZone.y += shrink * 0.5;
    battleRoyaleZone.width -= shrink * 2;
    battleRoyaleZone.height -= shrink;

    if (battleRoyaleZone.width < 200) battleRoyaleZone.width = 200;
    if (battleRoyaleZone.height < 200) battleRoyaleZone.height = 200;
  }

  // ---------------------------------------------------------------------------
  // Rendering
  // ---------------------------------------------------------------------------
  function render() {
    ctx.clearRect(0, 0, W, H);

    // --- Battle Royale zone ---
    if (battleRoyaleActive && battleRoyaleZone) {
      drawBattleZone();
    }

    // --- Avatars (sorted by Y for depth) ---
    const sorted = Array.from(avatars.values()).sort((a, b) => a.y - b.y);
    for (const avatar of sorted) {
      drawAvatar(avatar);
    }

    // --- Effects ---
    drawEffects();

    // --- Battle Royale HUD ---
    if (battleRoyaleActive) {
      drawBattleHUD();
    }
  }

  function drawBattleZone() {
    const z = battleRoyaleZone;
    // Darken area outside zone
    ctx.fillStyle = 'rgba(255, 0, 0, 0.08)';
    ctx.fillRect(0, 0, W, z.y);                         // top
    ctx.fillRect(0, z.y + z.height, W, H - z.y - z.height); // bottom
    ctx.fillRect(0, z.y, z.x, z.height);                 // left
    ctx.fillRect(z.x + z.width, z.y, W - z.x - z.width, z.height); // right

    // Zone border
    ctx.strokeStyle = 'rgba(255, 50, 50, 0.6)';
    ctx.lineWidth = 3;
    ctx.setLineDash([10, 5]);
    ctx.strokeRect(z.x, z.y, z.width, z.height);
    ctx.setLineDash([]);
  }

  function drawAvatar(avatar) {
    const x = avatar.x;
    const y = avatar.y;
    const w = avatar.width;
    const h = avatar.height;

    ctx.save();

    // Flip if facing left
    if (avatar.direction === -1) {
      ctx.translate(x + w, y);
      ctx.scale(-1, 1);
      ctx.translate(0, 0);
    } else {
      ctx.translate(x, y);
    }

    // --- Try to draw sprite ---
    const drewSprite = drawSprite(avatar, 0, 0, w, h);

    if (!drewSprite) {
      // Fallback: Draw colored character
      drawFallbackCharacter(avatar, w, h);
    }

    ctx.restore();

    // --- HP Bar (above avatar) ---
    if (battleRoyaleActive && avatar.state !== 'dead') {
      drawHPBar(avatar);
    }

    // --- Username label ---
    drawUsername(avatar);
  }

  function drawFallbackCharacter(avatar, w, h) {
    const isDead = avatar.state === 'dead';
    const isAttacking = avatar.state === 'attacking';
    const isDancing = avatar.state === 'dancing';

    if (isDead) {
      ctx.globalAlpha = 0.4;
    }

    // Body
    ctx.fillStyle = avatar.color;
    ctx.beginPath();
    ctx.roundRect(w * 0.15, h * 0.3, w * 0.7, h * 0.6, 6);
    ctx.fill();

    // Head
    ctx.fillStyle = avatar.color;
    ctx.beginPath();
    ctx.arc(w / 2, h * 0.25, w * 0.28, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(w * 0.38, h * 0.22, w * 0.08, 0, Math.PI * 2);
    ctx.arc(w * 0.62, h * 0.22, w * 0.08, 0, Math.PI * 2);
    ctx.fill();

    // Pupils
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(w * 0.40, h * 0.22, w * 0.04, 0, Math.PI * 2);
    ctx.arc(w * 0.64, h * 0.22, w * 0.04, 0, Math.PI * 2);
    ctx.fill();

    // Attack arm
    if (isAttacking) {
      ctx.fillStyle = avatar.color;
      ctx.fillRect(w * 0.85, h * 0.35, w * 0.35, h * 0.1);
    }

    // Dance animation
    if (isDancing) {
      const danceOffset = Math.sin(Date.now() * 0.01) * 3;
      ctx.fillStyle = avatar.color;
      ctx.fillRect(w * -0.1, h * 0.4 + danceOffset, w * 0.25, h * 0.08);
      ctx.fillRect(w * 0.85, h * 0.4 - danceOffset, w * 0.25, h * 0.08);
    }

    // Platform badge
    const badgeColor = avatar.platform === 'twitch' ? '#9146FF' : avatar.platform === 'kick' ? '#53FC18' : '#888';
    ctx.fillStyle = badgeColor;
    ctx.beginPath();
    ctx.arc(w * 0.82, h * 0.08, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
  }

  function drawHPBar(avatar) {
    const barW = avatar.width * 1.2;
    const barH = 6;
    const barX = avatar.x + (avatar.width - barW) / 2;
    const barY = avatar.y - 18;

    // Background
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW, barH, 3);
    ctx.fill();

    // HP fill
    const hpRatio = Math.max(0, avatar.hp / avatar.maxHp);
    const hpColor = hpRatio > 0.5 ? '#4CAF50' : hpRatio > 0.25 ? '#FF9800' : '#F44336';
    ctx.fillStyle = hpColor;
    ctx.beginPath();
    ctx.roundRect(barX, barY, barW * hpRatio, barH, 3);
    ctx.fill();
  }

  function drawUsername(avatar) {
    ctx.font = 'bold 12px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillText(avatar.username, avatar.x + avatar.width / 2 + 1, avatar.y - 5);
    ctx.fillStyle = '#fff';
    ctx.fillText(avatar.username, avatar.x + avatar.width / 2, avatar.y - 6);
  }

  function drawEffects() {
    for (const e of effects) {
      const elapsed = Date.now() - e.startTime;

      if (e.type === 'explosion') {
        for (const p of e.particles) {
          if (p.life <= 0) continue;
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      } else if (e.type === 'join') {
        const progress = elapsed / e.duration;
        const radius = 30 + progress * 30;
        ctx.globalAlpha = 1 - progress;
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(e.x, e.y, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      } else if (e.type === 'hit') {
        const progress = elapsed / e.duration;
        ctx.globalAlpha = 1 - progress;
        ctx.fillStyle = '#FFEB3B';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('💥', e.x, e.y - 10 - progress * 20);
        ctx.globalAlpha = 1;
      } else if (e.type === 'nuke') {
        const progress = elapsed / 1500;
        // White flash
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, 0.5 - progress)})`;
        ctx.fillRect(0, 0, W, H);
        // Multiple explosions
        for (const ex of e.explosions) {
          const r = progress * 80;
          ctx.globalAlpha = Math.max(0, 1 - progress);
          ctx.fillStyle = ex.color || '#FF6B6B';
          ctx.beginPath();
          ctx.arc(ex.x, ex.y, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
    }
  }

  function drawBattleHUD() {
    const alive = Array.from(avatars.values()).filter(a => a.state !== 'dead').length;
    const total = avatars.size;

    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.beginPath();
    ctx.roundRect(W / 2 - 120, 20, 240, 50, 12);
    ctx.fill();

    ctx.fillStyle = '#FF4444';
    ctx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⚔ BATTLE ROYALE ⚔', W / 2, 42);

    ctx.fillStyle = '#fff';
    ctx.font = '12px "Segoe UI", Arial, sans-serif';
    ctx.fillText(`${alive} / ${total} überlebt`, W / 2, 60);
  }

  // ---------------------------------------------------------------------------
  // Main Game Loop (requestAnimationFrame – performance-optimized)
  // ---------------------------------------------------------------------------
  let lastTime = performance.now();

  function gameLoop(timestamp) {
    const dt = timestamp - lastTime;
    lastTime = timestamp;

    // Cap delta to avoid huge jumps on tab switch
    const cappedDt = Math.min(dt, 50);

    updateAvatars(cappedDt);
    updateEffects(cappedDt);
    updateBattleRoyaleZone(Date.now());
    render();

    requestAnimationFrame(gameLoop);
  }

  requestAnimationFrame(gameLoop);

  // ---------------------------------------------------------------------------
  // Socket.io Connection
  // ---------------------------------------------------------------------------
  const socket = io();

  socket.on('connect', () => {
    console.log('[Overlay] Connected to server');
  });

  socket.on('init', (data) => {
    avatars.clear();
    if (data.config) config = data.config;
    if (data.avatars) {
      for (const a of data.avatars) avatars.set(a.id, a);
    }
    battleRoyaleActive = data.battleRoyaleActive || false;
    battleRoyaleZone = data.battleRoyaleZone || null;
  });

  socket.on('stateUpdate', (data) => {
    // Merge server state into local state
    if (data.avatars) {
      // Update existing and add new
      const serverIds = new Set();
      for (const a of data.avatars) {
        serverIds.add(a.id);
        const existing = avatars.get(a.id);
        if (existing) {
          // Preserve local physics state for smooth movement, update server-driven values
          existing.hp = a.hp;
          existing.maxHp = a.maxHp;
          existing.state = a.state;
          existing.isJumping = a.isJumping;
          existing.jumpStartTime = a.jumpStartTime;
          existing.attackCooldown = a.attackCooldown;
          existing.targetId = a.targetId;
          existing.color = a.color;
          existing.username = a.username;
          existing.platform = a.platform;
          existing.direction = a.direction;
          // Smooth position interpolation
          existing.x += (a.x - existing.x) * 0.3;
          existing.y += (a.y - existing.y) * 0.3;
          existing.vx += (a.vx - existing.vx) * 0.2;
        } else {
          avatars.set(a.id, a);
        }
      }
      // Remove avatars not in server state
      for (const [id] of avatars) {
        if (!serverIds.has(id)) avatars.delete(id);
      }
    }
    battleRoyaleActive = data.battleRoyaleActive || false;
    battleRoyaleZone = data.battleRoyaleZone || null;
  });

  socket.on('avatarJoined', (data) => {
    addJoinEffect(
      W / 2, H * GROUND_Y_RATIO,
      data.color
    );
  });

  socket.on('avatarJumped', (data) => {
    const avatar = avatars.get(data.username.toLowerCase());
    if (avatar && !avatar.isJumping) {
      avatar.isJumping = true;
      avatar.jumpStartTime = Date.now();
      avatar.state = 'jumping';
    }
  });

  socket.on('battleRoyaleStart', (data) => {
    battleRoyaleActive = true;
    battleRoyaleZone = data.zone;
    lastShrinkTime = Date.now();
  });

  socket.on('battleRoyaleEnd', () => {
    battleRoyaleActive = false;
    battleRoyaleZone = null;
  });

  socket.on('nuke', (data) => {
    addNukeEffect(data.explosions);
  });

  // ---------------------------------------------------------------------------
  // Sprite Auto-Discovery
  // ---------------------------------------------------------------------------
  async function discoverSprites() {
    try {
      const res = await fetch('/api/sprites');
      const data = await res.json();
      for (const file of data.sprites) {
        if (file.endsWith('.png')) {
          const name = file.replace('.png', '');
          loadSprite(name, `/sprites/avatars/${file}`);
        }
      }
    } catch (e) {
      console.log('[Overlay] No custom sprites found, using fallback rendering');
    }
  }
  discoverSprites();

})();
</script>
</body>
</html>
